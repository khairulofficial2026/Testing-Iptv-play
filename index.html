<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Pro</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial;
}

/* PLAYER */
.player{
    width:100%;
    aspect-ratio:16/9;
    background:black;
}

video{
    width:100%;
    height:100%;
}

/* SEARCH */
.searchBar{
    padding:10px;
    background:#111;
}

.searchBar input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    font-size:16px;
}

/* CHANNEL LIST */
.channels{
    height:40vh;
    overflow:auto;
    background:#141414;
}

.item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.item:hover{
    background:#e50914;
}

.item img{
    width:40px;
    height:40px;
    border-radius:6px;
    object-fit:cover;
}
</style>
</head>

<body>

<!-- PLAYER -->
<div class="player">
    <video id="video" controls></video>
</div>

<!-- SEARCH -->
<div class="searchBar">
    <input type="text" id="search" placeholder="Search channel...">
</div>

<!-- LIST -->
<div class="channels" id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video = document.getElementById("video");
let hls;

// 👉 M3U file
const playlistUrl = "playlist.m3u";

// play stream
function play(url){
    if(hls){ hls.destroy(); }

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

let allChannels = [];

// load M3U
async function loadM3U(){

    const res = await fetch(playlistUrl);
    const text = await res.text();

    const lines = text.split("\n");

    let name = "";
    let logo = "";

    for(let i=0;i<lines.length;i++){

        let line = lines[i].trim();

        if(line.startsWith("#EXTINF")){

            name = line.split(",")[1] || "Unknown";

            let logoMatch = line.match(/tvg-logo="(.*?)"/);
            logo = logoMatch ? logoMatch[1] : "";

        }
        else if(line.startsWith("http")){

            allChannels.push({
                name:name,
                logo:logo,
                url:line
            });
        }
    }

    render(allChannels);
}

// render list
function render(data){

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(ch=>{

        let div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <img src="${ch.logo || 'https://via.placeholder.com/40'}">
            <span>${ch.name}</span>
        `;

        div.onclick = ()=> play(ch.url);

        list.appendChild(div);
    });
}

// SEARCH
document.getElementById("search").addEventListener("input", function(){

    let value = this.value.toLowerCase();

    let filtered = allChannels.filter(ch =>
        ch.name.toLowerCase().includes(value)
    );

    render(filtered);
});

// start
loadM3U();
play("");

</script>

</body>
</html>
