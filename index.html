<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Pro</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial;
}

/* Header */
header{
    background:#e50914;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* Video top */
.player{
    width:100%;
    aspect-ratio:16/9;
    background:black;
}

video{
    width:100%;
    height:100%;
}

/* channel list */
.channels{
    height:40vh;
    overflow:auto;
    background:#141414;
}

.item{
    padding:12px;
    border-bottom:1px solid #333;
    cursor:pointer;
}

.item:hover{
    background:#e50914;
}

/* bottom search */
.searchBar{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    padding:10px;
    display:flex;
}

.searchBar input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    font-size:16px;
}
</style>
</head>

<body>

<header>📺 IPTV PLAYER</header>

<div class="player">
    <video id="video" controls></video>
</div>

<div class="channels" id="list"></div>

<!-- 🔍 Bottom search -->
<div class="searchBar">
    <input type="text" id="search" placeholder="Search channel...">
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video = document.getElementById("video");
let hls;

// 📺 Channels
const channels = [
  {name:"Somoy TV", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/1702-audio_113322_eng=113200-video=1692000.m3u8"},
  {name:"Channel 24", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1703/output/1703-audio_113332_eng=113200-video=1692000.m3u8"},
  {name:"Tom & Jerry", url:"https://live20.bozztv.com/giatvplayout7/giatv-208314/playlist.m3u8"},
  {name:"Independence TV", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1704/output/index.m3u8"},
  {name:"BTV", url:"https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8"},
  {name:"Ekhon TV", url:"https://bldcmprod-cdn.toffeelive.com/cdn/live/ekhon_tv/playlist.m3u8"}
];

function play(url){
    if(hls){ hls.destroy(); }

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

// render list
const list = document.getElementById("list");

function render(data){
    list.innerHTML = "";

    data.forEach(ch=>{
        let div = document.createElement("div");
        div.className = "item";
        div.innerText = "📺 " + ch.name;
        div.onclick = ()=> play(ch.url);
        list.appendChild(div);
    });
}

render(channels);

// 🔍 search bottom bar
document.getElementById("search").addEventListener("input", function(){

    let value = this.value.toLowerCase();

    let filtered = channels.filter(ch =>
        ch.name.toLowerCase().includes(value)
    );

    render(filtered);
});

// auto play first
play(channels[0].url);

</script>

</body>
</html>
