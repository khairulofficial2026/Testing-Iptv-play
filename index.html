<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature IPTV Live</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:radial-gradient(circle at top,#1a1a1a,#0b0b0b);
color:white;
}

/* HEADER */
header{
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
background:linear-gradient(90deg,#e50914,#111);
position:sticky;
top:0;
z-index:999;
}

.sig-title{
animation:smooth 2.5s ease-in-out infinite;
display:inline-block;
}

@keyframes smooth{
0%{transform:translateY(0)}
50%{transform:translateY(-3px)}
100%{transform:translateY(0)}
}

/* PLAYER */
.player{
width:100%;
aspect-ratio:16/9;
background:black;
}

video{
width:100%;
height:100%;
}

/* SEARCH */
.search-container{
padding:15px;
text-align:center;
}

.search-container input{
width:90%;
max-width:500px;
padding:12px;
border:none;
outline:none;
border-radius:30px;
background:#222;
color:white;
}

.search-container input:focus{
box-shadow:0 0 15px rgba(229,9,20,.6);
}

/* CHANNEL GRID */
.channels{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
padding:15px;
}

.channel{
background:#1a1a1a;
border-radius:15px;
padding:15px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.channel:hover{
transform:scale(1.08);
background:#e50914;
}

.channel img{
width:70px;
height:70px;
border-radius:12px;
object-fit:cover;
margin-bottom:10px;
}

.channel-name{
font-size:14px;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<span class="sig-title">🎬 Signature IPTV Live</span>
</header>

<div class="player">
<video id="video" controls autoplay playsinline></video>
</div>

<div class="search-container">
<input type="text" id="search" placeholder="Search channel...">
</div>

<div class="channels" id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video = document.getElementById("video");
let hls;

/* ✅ AUTO PLAYLIST */
const playlistUrl = "playlist.m3u";

/* PLAY STREAM */
function play(url){

if(hls){
hls.destroy();
}

if(Hls.isSupported()){

hls = new Hls({
enableWorker:true,
lowLatencyMode:true,
backBufferLength:30,
maxBufferLength:10
});

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play().catch(()=>{});
});

}else{

video.src = url;

}

}

/* CHANNEL DATA */
let allChannels = [];

/* LOAD M3U */
async function loadM3U(){

try{

const res = await fetch(playlistUrl);
const text = await res.text();

const lines = text.split("\n");

let name = "";
let logo = "";

for(let i=0;i<lines.length;i++){

let line = lines[i].trim();

if(line.startsWith("#EXTINF")){

name = line.split(",")[1] || "Unknown";

let logoMatch = line.match(/tvg-logo="(.*?)"/);
logo = logoMatch ? logoMatch[1] : "";

}
else if(line.startsWith("http")){

allChannels.push({
name:name,
logo:logo,
url:line
});

}

}

render(allChannels);

if(allChannels.length){
play(allChannels[0].url);
}

}catch(e){
alert("M3U file load error!");
console.log(e);
}

}

/* RENDER UI */
function render(data){

const list = document.getElementById("list");
list.innerHTML = "";

data.forEach(ch=>{

const div = document.createElement("div");
div.className = "channel";

div.innerHTML = `
<img src="${ch.logo || 'https://via.placeholder.com/70'}">
<div class="channel-name">${ch.name}</div>
`;

div.onclick = ()=> play(ch.url);

list.appendChild(div);

});

}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){

const value = this.value.toLowerCase();

const filtered = allChannels.filter(ch=>
ch.name.toLowerCase().includes(value)
);

render(filtered);

});

/* ✅ AUTO START */
window.onload = () => {
loadM3U();
};

</script>

</body>
</html>
