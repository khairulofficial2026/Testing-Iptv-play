<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Play IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }

        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .status-bar {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: #999;
        }

        .player-section {
            background: #000;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
        }

        .player-section video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .controls {
            background: #1a1a1a;
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .tabs {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .tab {
            padding: 10px 0;
            color: #999;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #fff;
            border-bottom-color: #0099ff;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 15px;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .channels-section {
            padding: 12px;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .channel {
            cursor: pointer;
            transition: transform 0.3s;
            text-align: center;
        }

        .channel:hover {
            transform: scale(1.05);
        }

        .channel-logo {
            width: 100%;
            aspect-ratio: 1;
            background: #2d2d2d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            position: relative;
            overflow: hidden;
            border: 2px solid #444;
        }

        .channel-logo img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        .channel-logo .play-icon {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.5);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .heart-icon {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.5);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
        }

        .heart-icon:hover {
            background: rgba(255, 0, 0, 0.6);
        }

        .channel-name {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 3px;
            color: #fff;
        }

        .channel-label {
            font-size: 10px;
            color: #999;
        }

        @media (max-width: 768px) {
            .channels-grid {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📺 Prime Play</h1>
    <div class="status-bar">
        <span>🔋 82%</span>
    </div>
</div>

<div class="player-section">
    <video id="player" controls autoplay muted playsinline></video>
</div>

<div class="controls">
    <div class="tabs">
        <div class="tab active" onclick="switchTab(this)">Prime Play</div>
        <div class="tab" onclick="switchTab(this)">Favorites</div>
        <div class="tab" onclick="switchTab(this)">Top Picks</div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search channels..." onkeyup="filterChannels()">
    </div>
</div>

<div class="channels-section">
    <div class="channels-grid" id="channelsGrid">
        <!-- Channels will be loaded here -->
    </div>
</div>

<script>
    // ======== এখানে আপনার চ্যানেল লিঙ্ক যোগ করুন ========
    const channels = [
        {
            name: "PTV Sports",
            logo: "http://172.20.3.1/static/images/20260312214748_1-7-1.jpg",
            url: "https://tvsen5.aynaott.com/PtvSports/index.m3u8"
        },
        {
            name: "Sports 1",
            logo: "https://mir-s3-cdn-cf.behance.net/project_modules/fs_webp/f64bc1250131057.6a17b080da2ef.png",
            url: "https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8"
        },
        {
            name: "Sports 2",
            logo: "http://172.20.3.1/static/images/20260110000632_fimg1.jpg",
            url: "https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8"
        },
        {
            name: "Sports 3",
            logo: "http://172.20.3.1/static/images/20260217172937_20260206202629_beIN_SSPORTS_Portada.jpg",
            url: "https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/Caze_TV.m3u8"
        },
        {
            name: "Tspots 2",
            logo: "https://via.placeholder.com/150?text=Tspots+2",
            url: "https://your-channel-link-2.m3u8"
        },
        {
            name: "Tspots 3",
            logo: "https://via.placeholder.com/150?text=Tspots+3",
            url: "https://your-channel-link-3.m3u8"
        },
        {
            name: "SPORTS 1",
            logo: "https://via.placeholder.com/150?text=SPORTS+1",
            url: "https://your-sports-link-1.m3u8"
        },
        {
            name: "SPORTS 2",
            logo: "https://via.placeholder.com/150?text=SPORTS+2",
            url: "https://your-sports-link-2.m3u8"
        },
        {
            name: "SPORTS 3",
            logo: "https://via.placeholder.com/150?text=SPORTS+3",
            url: "https://your-sports-link-3.m3u8"
        }
    ];
    // ========= চ্যানেল যোগ করা শেষ ==========

    let hls;

    function initHLS(url) {
        const video = document.getElementById('player');
        
        if (hls) {
            hls.destroy();
        }

        // HLS.js configuration for fast and smooth playback
        hls = new HLS({
            debug: false,
            enableWorker: true,
            lowLatencyMode: true,
            maxBufferLength: 30,
            maxMaxBufferLength: 600,
            maxBufferSize: 60 * 1000 * 1000,
            maxBufferHole: 0.5,
            liveSyncDurationCount: 3,
            liveMaxLatencyDurationCount: 10,
            progressive: true,
            backBufferLength: 90
        });

        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(HLS.Events.MANIFEST_PARSED, function() {
            console.log("Stream loaded!");
        });

        hls.on(HLS.Events.ERROR, function(event, data) {
            if (data.fatal) {
                switch(data.type) {
                    case HLS.ErrorTypes.NETWORK_ERROR:
                        console.log('Network error, retrying...');
                        hls.startLoad();
                        break;
                    case HLS.ErrorTypes.MEDIA_ERROR:
                        console.log('Media error, recovery in progress');
                        hls.recoverMediaError();
                        break;
                    default:
                        hls.destroy();
                        break;
                }
            }
        });
    }

    function loadChannels() {
        const grid = document.getElementById('channelsGrid');
        grid.innerHTML = '';

        channels.forEach(channel => {
            const channelDiv = document.createElement('div');
            channelDiv.className = 'channel';
            channelDiv.innerHTML = `
                <div class="channel-logo" onclick="playChannel('${channel.url}', '${channel.name}')">
                    <img src="${channel.logo}" alt="${channel.name}" onerror="this.src='https://via.placeholder.com/150?text=${channel.name.replace(' ', '+')}'">
                    <div class="heart-icon" onclick="event.stopPropagation(); toggleFavorite(this)">❤️</div>
                </div>
                <div class="channel-name">${channel.name}</div>
                <div class="channel-label">Prime Play</div>
            `;
            grid.appendChild(channelDiv);
        });
    }

    function playChannel(url, name) {
        const video = document.getElementById('player');
        document.querySelector('.header h1').textContent = `📺 ${name}`;
        
        // Use HLS.js for m3u8 streams
        if (url.includes('.m3u8')) {
            if (HLS.isSupported()) {
                initHLS(url);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        } else {
            video.src = url;
        }

        video.play().catch(err => console.log("Playback error:", err));
    }

    function switchTab(element) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');
    }

    function filterChannels() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.channel').forEach(channel => {
            const channelName = channel.querySelector('.channel-name').textContent.toLowerCase();
            channel.style.display = channelName.includes(searchTerm) ? 'block' : 'none';
        });
    }

    function toggleFavorite(element) {
        element.textContent = element.textContent === '❤️' ? '🤍' : '❤️';
    }

    // Page load
    loadChannels();
</script>

</body>
</html>
