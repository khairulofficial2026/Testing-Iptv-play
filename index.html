<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature IPTV Live</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:radial-gradient(circle at top,#1a1a1a,#0b0b0b);
color:white;
}

/* HEADER */
header{
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
background:linear-gradient(90deg,#e50914,#111);
position:sticky;
top:0;
z-index:999;
}

.sig-title{
animation:smooth 2.5s ease-in-out infinite;
display:inline-block;
}

@keyframes smooth{
0%{transform:translateY(0)}
50%{transform:translateY(-3px)}
100%{transform:translateY(0)}
}

/* PLAYER */
.player{
width:100%;
aspect-ratio:16/9;
background:black;
}

video{
width:100%;
height:100%;
background:black;
}

/* SEARCH */
.search-container{
padding:15px;
text-align:center;
}

.search-container input{
width:90%;
max-width:500px;
padding:12px;
border:none;
outline:none;
border-radius:30px;
background:#222;
color:white;
font-size:15px;
}

.search-container input:focus{
box-shadow:0 0 15px rgba(229,9,20,.6);
}

/* CHANNEL GRID */
.channels{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
padding:15px;
}

.channel{
background:#1a1a1a;
border-radius:15px;
padding:15px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.channel:hover{
transform:scale(1.08);
background:#e50914;
}

.channel img{
width:70px;
height:70px;
border-radius:12px;
object-fit:cover;
margin-bottom:10px;
}

.channel-name{
font-size:14px;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<span class="sig-title">🎬 Signature IPTV Live</span>
</header>

<div class="player">
<video id="video" controls autoplay playsinline></video>
</div>

<div class="search-container">
<input type="text" id="search" placeholder="Search channel...">
</div>

<div class="channels" id="list"></div>
