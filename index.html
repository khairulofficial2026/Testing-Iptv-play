<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    background: #1a1a1a;
    color: white;
    font-family: Arial, sans-serif;
}

.header {
    padding: 12px;
    background: #111;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.player-section {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    background: black;
}

.player-section video {
    position: absolute;
    width: 100%;
    height: 100%;
}

.channels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 10px;
    padding: 10px;
}

.channel {
    text-align: center;
    cursor: pointer;
}

.channel img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
}
</style>
</head>

<body>

<div class="header">
    <div id="title">📺 Signature IPTV</div>
</div>

<div class="player-section">
    <video id="video" controls autoplay muted playsinline></video>
</div>

<div class="channels-grid" id="grid"></div>

<script>
const channels = [
    {
        name: "PTV Sports",
        logo: "http://172.20.3.1/static/images/20260312214748_1-7-1.jpg",
        url: "https://tvsen5.aynaott.com/PtvSports/index.m3u8"
    },
    {
    name: "Caze Tv",
    logo: "https://images.seeklogo.com/logo-png/61/1/cazetv-logo-png_seeklogo-619708.png",
    url: "https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/Caze_TV.m3u8"
},
    { name: "Win Sports", logo: "https://images.seeklogo.com/logo-png/25/1/win-sports-logo-png_seeklogo-259337.png", url: "https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8" },

{ name: "WORLD CUP TV (ENG)", logo: "https://upload.wikimedia.org/wikipedia/commons/4/4b/FIFA_WorldCup_logo.svg", url: "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd" },
    {
        name: "Sports 1",
        logo: "https://mir-s3-cdn-cf.behance.net/project_modules/fs_webp/f64bc1250131057.6a17b080da2ef.png",
        url: "https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8"
    }
];

let hls;

function play(url, name) {
    const video = document.getElementById("video");
    document.getElementById("title").innerText = "📺 " + name;

    if (hls) {
        hls.destroy();
        hls = null;
    }

    if (url.includes(".m3u8")) {
        if (Hls.isSupported()) {
            hls = new Hls({
                lowLatencyMode: true
            });

            hls.loadSource(url);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play();
            });

            hls.on(Hls.Events.ERROR, function (event, data) {
                console.log("HLS error:", data);
            });

        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
            video.src = url;
            video.play();
        }
    } else {
        video.src = url;
        video.play();
    }
}

function load() {
    const grid = document.getElementById("grid");

    channels.forEach(c => {
        const div = document.createElement("div");
        div.className = "channel";
        div.innerHTML = `
            <img src="${c.logo}" onerror="this.src='https://via.placeholder.com/80'" />
            <div>${c.name}</div>
        `;
        div.onclick = () => play(c.url, c.name);
        grid.appendChild(div);
    });
}

load();
</script>

</body>
</html>
